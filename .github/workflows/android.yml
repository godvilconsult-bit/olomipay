name: Android APK

# Builds a debug APK of the JIKO CONNECT Android wrapper in CI (the GitHub
# ubuntu runner has the Android SDK preinstalled). Download it from the run's
# Artifacts. Trigger on demand or when the frontend changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/android.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform + sync native plugins
        # `cap add` scaffolds the platform; the explicit `cap sync` AFTER it is
        # what guarantees every plugin in package.json (incl. @capacitor/
        # geolocation) is registered into the Gradle build. `add` alone has
        # been shipping APKs without the geolocation native module.
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Add location permissions to manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q ACCESS_FINE_LOCATION "$MANIFEST"; then
            perl -0pi -e 's/(<application)/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"\/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"\/>\n    $1/' "$MANIFEST"
          fi
          cat "$MANIFEST"

      - name: Verify Geolocation plugin is in the build
        # Fail the build (instead of the user) if the native module is missing.
        run: |
          if grep -riq "geolocation" android/capacitor.settings.gradle android/app/capacitor.build.gradle; then
            echo "✓ @capacitor/geolocation registered in the Android build"
          else
            echo "::error::@capacitor/geolocation is NOT registered — the APK would fail with 'not implemented on android'"
            echo '--- capacitor.settings.gradle ---'; cat android/capacitor.settings.gradle || true
            exit 1
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiko-connect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
