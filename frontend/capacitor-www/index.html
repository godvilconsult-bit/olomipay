<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JIKO CONNECT</title>
  <style>
    html, body { margin: 0; height: 100%; background: #160F0A; color: #FBF7F2;
      font-family: system-ui, sans-serif; display: grid; place-items: center; }
    .flame { width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #F15A24, #FFB100); display: grid; place-items: center;
      font-size: 32px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: .85 } 50% { transform: scale(1.08); opacity: 1 } }
    p { margin-top: 16px; opacity: .7; font-size: 14px; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="flame">🔥</div>
    <p>Inapakia JIKO CONNECT…</p>
  </div>
</body>
</html>
