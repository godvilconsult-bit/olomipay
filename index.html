<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OlomiPay — UI Kit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; }
  body { background: radial-gradient(1200px 800px at 50% -10%, #1e293b, #0b1120); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  /* Phone frame */
  .phone { position: relative; width: 390px; height: 100%; max-height: 844px; background: #000; border-radius: 52px; padding: 11px; box-shadow: 0 50px 100px -30px rgba(0,0,0,.7), 0 0 0 2px #1e293b; }
  .screen { position: relative; width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: #f8fafc; }
  .notch { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 0 0 18px 18px; z-index: 100; }

  .olo-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .olo-scroll { scrollbar-width: none; }

  /* Animations (from globals.css) */
  @keyframes olo-aurora { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(6%,-4%) scale(1.1)} 66%{transform:translate(-5%,5%) scale(.95)} }
  @keyframes olo-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  @keyframes olo-gradient { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  @keyframes olo-marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes olo-spin { to{transform:rotate(360deg)} }
  @keyframes olo-glowpulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:.9;transform:scale(1.08)} }
  @keyframes olo-msgR { from{transform:translate(8px,8px) scale(.96)} to{transform:none} }
  @keyframes olo-msgL { from{transform:translate(-8px,8px) scale(.96)} to{transform:none} }
  .olo-aurora { animation: olo-aurora 20s ease-in-out infinite; }
  .olo-float { animation: olo-float 6s ease-in-out infinite; }
  .olo-marquee { animation: olo-marquee 26s linear infinite; }
  .olo-msg-right { animation: olo-msgR .32s cubic-bezier(.22,1,.36,1); }
  .olo-msg-left { animation: olo-msgL .32s cubic-bezier(.22,1,.36,1); }
  @media (prefers-reduced-motion: reduce) { .olo-msg-right, .olo-msg-left { animation: none; } }
  .olo-gradient-text { background: linear-gradient(110deg,#3b82f6,#22d3ee,#22c55e,#3b82f6); background-size: 250% 250%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: olo-gradient 6s ease infinite; }
  @keyframes olo-rise { from { transform: translateY(0); } to { transform: translateY(-50%); } }
  .olo-rise { animation-name: olo-rise; animation-timing-function: linear; animation-iteration-count: infinite; }
  @keyframes olo-pulse { 0% { box-shadow: 0 0 0 0 rgba(52,211,153,.55); } 70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); } 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); } }
  .olo-pulse-dot { animation: olo-pulse 2s ease-out infinite; }
  @media (prefers-reduced-motion: reduce) { .olo-rise, .olo-pulse-dot { animation: none; } }
  .olo-glass { background: rgba(255,255,255,.06); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.12); }
  .olo-glow-ring { position: absolute; inset: -24px; border-radius: 40px; background: linear-gradient(to top right,rgba(59,130,246,.4),rgba(16,185,129,.4)); filter: blur(28px); z-index: -1; animation: olo-glowpulse 5s ease-in-out infinite; }
  .olo-glow { position: relative; }
  .olo-glow::before { content:''; position:absolute; inset:-2px; border-radius:inherit; background:linear-gradient(110deg,#3b82f6,#22c55e,#22d3ee); filter:blur(14px); opacity:.5; z-index:-1; }

  /* Toast */
  .olo-toast { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 200; background: #1e293b; color: #f1f5f9; font-size: 13px; font-weight: 500; padding: 12px 18px; border-radius: 12px; box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: olo-msgR .3s ease; white-space: nowrap; }

  @media (max-width: 460px) { body { padding: 0; } .phone { border-radius: 0; padding: 0; height: 100vh; max-height: none; } .screen { border-radius: 0; } .notch { display: none; } }

  /* More sheet */
  .olo-sheet-bg { position: absolute; inset: 0; z-index: 40; background: rgba(0,0,0,.5); backdrop-filter: blur(2px); }
  .olo-sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 41; background: #fff; border-radius: 28px 28px 0 0; padding: 18px 18px 28px; box-shadow: 0 -10px 40px -10px rgba(0,0,0,.3); animation: olo-msgR .28s cubic-bezier(.22,1,.36,1); }

  /* Money send popover — compact bottom-left card on tablet/desktop, full-width bar on phones */
  .olo-money-pop {
    position: absolute; z-index: 16; bottom: 78px; left: 12px; width: 248px;
    background: #fff; border-radius: 18px; border: 1px solid #eef2f7; padding: 14px;
    box-shadow: 0 14px 44px -10px rgba(15,23,42,.32);
    animation: olo-msgR .22s cubic-bezier(.22,1,.36,1);
  }
  @media (max-width: 460px) {
    .olo-money-pop { left: 12px; right: 12px; width: auto; bottom: 74px; }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen" id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screen-kit.jsx"></script>
  <script type="text/babel" src="marketing.jsx"></script>
  <script type="text/babel" src="app-screens.jsx"></script>
  <script type="text/babel" src="screens-money.jsx"></script>
  <script type="text/babel" src="screens-grow.jsx"></script>
  <script type="text/babel" src="screens-account.jsx"></script>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const MORE_ITEMS = [
      ['Earn', 'trending', 'stake'], ['Chama', 'users', 'chama'], ['Bills', 'receipt', 'bills'], ['Swap', 'swap', 'swap'],
      ['Card', 'card', 'card'], ['Bonds', 'globe', 'invest'], ['Merchant', 'qr', 'merchant'], ['Payroll', 'briefcase', 'payroll'],
      ['Rewards', 'star', 'rewards'], ['Credit', 'shield', 'credit'], ['History', 'clock', 'history'], ['Profile', 'shieldcheck', 'profile'],
    ];

    // Screens that show the bottom nav and which tab is highlighted
    const NAV_TABS = ['dashboard', 'chat', 'send', 'savings'];
    const TAB_FOR = { thread: 'chat', stake: 'savings', invest: 'savings', rewards: 'savings', chama: 'savings' };

    function App() {
      const [screen, setScreen] = useState('landing');
      const [convo, setConvo] = useState(null);
      const [balance, setBalance] = useState(1284.5);
      const [unread, setUnread] = useState(7);
      const [toast, setToast] = useState(null);
      const [sheet, setSheet] = useState(false);

      const fireToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); }, []);
      const home = () => setScreen('dashboard');
      const done = (msg) => { if (msg) fireToast(msg); home(); };

      const nav = (id) => {
        if (id === 'more') { setSheet(true); return; }
        setScreen(id);
      };

      const quickAction = (id) => setScreen(id); // send | deposit | withdraw | history

      const openThread = (c) => { setConvo(c); setScreen('thread'); setUnread(u => Math.max(0, u - (c.unread || 0))); };

      const confirmSend = (amt) => { setBalance(b => +(b - amt).toFixed(2)); fireToast(`✅ Sent $${amt.toFixed(2)} · settled in 0.8s`); home(); };
      const spend = (amt) => setBalance(b => +(b - amt).toFixed(2));

      const tab = NAV_TABS.includes(screen) ? screen : (TAB_FOR[screen] || 'dashboard');
      const showNav = NAV_TABS.includes(screen) || ['stake', 'invest', 'rewards', 'chama', 'history', 'profile', 'card', 'credit', 'merchant', 'payroll', 'notifications', 'deposit', 'withdraw'].includes(screen);

      let view;
      if (screen === 'landing') view = <Landing onGetStarted={() => setScreen('login')} onSignIn={() => setScreen('login')} />;
      else if (screen === 'login') view = <Login onBack={() => setScreen('landing')} onSignIn={() => { fireToast('Welcome back!'); home(); }} onRegister={() => { fireToast('Welcome back!'); home(); }} />;
      else if (screen === 'dashboard') view = <Dashboard onNav={nav} onAction={quickAction} balance={balance} onBell={() => setScreen('notifications')} />;
      else if (screen === 'chat') view = <ChatList onNav={nav} onOpen={openThread} unread={unread} />;
      else if (screen === 'thread') view = <ChatThread convo={convo} onBack={() => setScreen('chat')} onSendMoney={(a) => { spend(a); fireToast(`✅ Sent $${a.toFixed(2)} in chat`); }} />;
      else if (screen === 'send') view = <SendScreen onBack={home} onConfirm={confirmSend} balance={balance} />;
      else if (screen === 'deposit') view = <DepositScreen onBack={home} onDone={done} />;
      else if (screen === 'withdraw') view = <WithdrawScreen onBack={home} onDone={(m) => { done(m); }} balance={balance} />;
      else if (screen === 'history') view = <HistoryScreen onBack={home} />;
      else if (screen === 'savings') view = <SavingsScreen onBack={home} onDone={done} />;
      else if (screen === 'stake') view = <StakeScreen onBack={home} onDone={done} />;
      else if (screen === 'invest') view = <InvestScreen onBack={home} onDone={done} />;
      else if (screen === 'rewards') view = <RewardsScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'chama') view = <ChamaScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'bills') view = <BillsScreen onBack={home} onDone={done} />;
      else if (screen === 'swap') view = <SwapScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'card') view = <CardScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'credit') view = <CreditScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'merchant') view = <MerchantScreen onBack={home} onDone={fireToast} />;
      else if (screen === 'payroll') view = <PayrollScreen onBack={home} onDone={done} />;
      else if (screen === 'profile') view = <ProfileScreen onBack={home} onLogout={() => setScreen('landing')} balance={balance} />;
      else if (screen === 'notifications') view = <NotificationsScreen onBack={home} />;

      const hideNavScreens = ['send', 'deposit', 'withdraw', 'swap', 'bills'];

      return (
        <React.Fragment>
          {toast && <div className="olo-toast">{toast}</div>}
          {view}
          {showNav && !hideNavScreens.includes(screen) && <BottomNav active={tab} unread={unread} onNav={nav} />}

          {sheet && (
            <React.Fragment>
              <div className="olo-sheet-bg" onClick={() => setSheet(false)} />
              <div className="olo-sheet">
                <div style={{ width: 40, height: 4, borderRadius: 999, background: '#e2e8f0', margin: '0 auto 16px' }} />
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                  <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: '#0f172a' }}>All features</h3>
                  <button onClick={() => setSheet(false)} style={{ border: 0, background: '#f1f5f9', borderRadius: 999, padding: 8, cursor: 'pointer', color: '#475569', display: 'flex' }}><Icon name="x" size={16} /></button>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12 }}>
                  {MORE_ITEMS.map(([label, icon, route]) => (
                    <button key={label} onClick={() => { setSheet(false); setScreen(route); }} style={{ border: 0, background: 'none', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, padding: 4 }}>
                      <div style={{ width: 54, height: 54, borderRadius: 16, background: '#f1f5f9', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#1a56db' }}><Icon name={icon} size={20} /></div>
                      <span style={{ fontSize: 10, fontWeight: 500, color: '#64748b' }}>{label}</span>
                    </button>
                  ))}
                </div>
              </div>
            </React.Fragment>
          )}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
